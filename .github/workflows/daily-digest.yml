name: Daily English News Digest

on:
  schedule:
    - cron: "30 9 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: |
          digest_date="$(date -u +%F)"
          if [ -f "digests/${digest_date}.md" ]; then
            echo "Digest for ${digest_date} already exists; skipping generation."
            exit 0
          fi
          python scripts/generate_digest.py --date "${digest_date}"

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests data
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "Add daily digest $(date -u +%F)"
            for attempt in 1 2 3; do
              if git push; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              echo "git push failed; retrying in 30 seconds..."
              sleep 30
            done
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
